- id: "dining_room_lamp_lamp_colour"
  alias: "dining_room_lamp - Set to new colour"
  description: ""
  triggers:
  - trigger: "state"
    entity_id: "input_number.downstairs_light_colour_index"
  conditions:
  - condition: "light.is_on"
    target:
      entity_id: "light.dining_room_lamp"
  variables:
    colour:
    - 255
    - 0
    - 0
    colour_cycle:
    - - 255
      - 137
      - 14
    - - 255
      - 193
      - 142
    - - 255
      - 229
      - 207
    - - 255
      - 255
      - 251
    - - 255
      - 112
      - 86
    - - 112
      - 255
      - 86
    - - 129
      - 173
      - 255
    - - 215
      - 151
      - 255
    - - 255
      - 159
      - 242
  actions:
  - action: "light.turn_on"
    metadata: {}
    target:
      entity_id: "light.dining_room_lamp"
    data:
      rgb_color: "{% set idx = states('input_number.downstairs_light_colour_index')\
        \ | int + 1 %} {% set idx = idx % colour_cycle | length %} {% set colour =\
        \ colour_cycle[idx] %} [{{colour[0]-}}, {{colour[1]-}}, {{colour[2]-}}]\n"
  mode: "single"
