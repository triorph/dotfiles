- id: "heatpump_notify_turn_off"
  alias: "Downstairs heat pump - notify can be turned off at 18 degrees"
  description: ""
  triggers:
  - trigger: "temperature.crossed_threshold"
    target:
      entity_id: "sensor.temperature_humidity_sensor_1_temperature"
    options:
      behavior: "each"
      threshold:
        value:
          active_choice: "number"
          number: 18
          unit_of_measurement: "°C"
        type: "above"
      for:
        hours: 0
        minutes: 10
        seconds: 0
  conditions:
  - condition: "time"
    after: "09:00:00"
    before: "17:00:00"
  actions:
  - action: "notify.send_message"
    metadata: {}
    target:
      device_id: "449719a7d011795e08e37c0f114f4771"
    data:
      message: "Downstairs heat reached threshold "
  mode: "single"
