- id: "1781210376062"
  alias: "Notify heat pump can be turned off"
  description: ""
  triggers:
  - trigger: "temperature.crossed_threshold"
    target:
      entity_id: "sensor.temperature_humidity_sensor_1_temperature"
    options:
      behavior: "each"
      for:
        hours: 0
        minutes: 10
        seconds: 0
      threshold:
        type: "above"
        value:
          active_choice: "number"
          number: 18
          unit_of_measurement: "°C"
  conditions:
  - condition: "time"
    after: "09:00:00"
    before: "17:00:00"
  actions:
  - action: "notify.send_message"
    metadata: {}
    target:
      device_id: "449719a7d011795e08e37c0f114f4771"
    data:
      message: "Downstairs heat reached threshold "
  mode: "single"
- id: "1781216970827"
  alias: "Disable heatpump after reaching threshold"
  description: ""
  triggers:
  - trigger: "temperature.crossed_threshold"
    target:
      area_id: "mike_s_office"
    options:
      behavior: "each"
      threshold:
        type: "above"
        value:
          active_choice: "entity"
          entity: "input_number.mikes_office_target_heatpump_heat_temp"
      for:
        hours: 0
        minutes: 5
        seconds: 0
  conditions:
  - condition: "climate.is_hvac_mode"
    target:
      entity_id: "climate.mike_s_office_heatpump_mike_s_office_mike_s_office_heater"
    options:
      behavior: "any"
      hvac_mode:
      - "heat"
  actions:
  - action: "climate.turn_off"
    metadata: {}
    target:
      entity_id: "climate.mike_s_office_heatpump_mike_s_office_mike_s_office_heater"
    data: {}
  mode: "single"
